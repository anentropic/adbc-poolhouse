# .doc-writer/config.yaml — generated by /doc-writer:setup
version: 1

plugin_version: "1.7.1"

user_personas:
  - name: "Library authors making ADBC queries"
    skill_level: "expert"
    assumed_knowledge:
      - "Python (expert level)"
      - "ADBC and its DBAPI/cursor model"
      - "SQL"
      - "Warehouse drivers"
      - "Declaring dependency extras"
    never_assume:
      - "Connection-pooling concepts and trade-offs"
      - "Pool size vs. max-overflow tuning"
      - "Checkout/checkin connection lifecycle"
      - "Pre-ping and connection recycling"
      - "Draining/closing a pool"
      - "Why pooling matters for ADBC specifically"
    domain_context: "Building libraries or tools that issue ADBC queries against warehouses and need robust connection pooling without hand-rolling it"
    discovery_story: "Knew they needed pooling for ADBC (whose DBAPI has none built in) and looked for an existing solution rather than rolling their own"
    user_tasks:
      - "Create a pool from a typed warehouse config"
      - "Check connections out and back in"
      - "Tune pool sizing"
      - "Manage pool lifecycle (close/drain)"
      - "Select the right backend extra"
      - "Optionally use the async surface"
  - name: "Application developers building ADBC-backed backends/servers"
    skill_level: "expert"
    assumed_knowledge:
      - "Python (expert level)"
      - "SQL"
      - "ADBC and its DBAPI/cursor model"
      - "Building long-running backend/server applications"
      - "Declaring dependency extras"
    never_assume:
      - "Connection-pooling intricacies"
      - "Pool size vs. max-overflow tuning"
      - "Checkout/checkin per request"
      - "Pre-ping and connection recycling"
      - "How the pool behaves under concurrent load"
      - "Lifecycle tied to app startup/shutdown"
    domain_context: "Building long-running backend/server applications that issue ADBC queries against warehouses under concurrent request load"
    discovery_story: "Building a server that queries a warehouse, hit the need for pooling under load, and looked for an ADBC-compatible pool rather than rolling their own"
    user_tasks:
      - "Create a pool from a typed config at app startup"
      - "Check connections out and back in per request"
      - "Tune pool sizing for concurrency"
      - "Manage pool lifecycle across app startup/shutdown"
      - "Use the async surface in async servers"
      - "Select the right backend extra"

tone: "warm-businesslike"

use_cases: []

use_cases_section: false

doc_system: "mkdocs-material"
api_reference: "mkdocstrings"

paths:
  docs_root: "docs/src"
  source_root: "src"

detected:
  language: "python"
  doc_system: "mkdocs-material"
  existing_docs: true

qa_answers:
  navigation: "Sections as top tabs"
  api_docs: "mkdocstrings"
  features:
    - "Admonitions"
    - "Content tabs"
    - "Collapsible details"
    - "Code annotations"
